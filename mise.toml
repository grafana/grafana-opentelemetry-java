[tools]

# Linters
actionlint = "1.7.10"
biome = "2.4.12"
"cargo:xmloxide" = "0.4.1"
"cargo:yaml-lint" = "0.1.0"
editorconfig-checker = "v3.6.0"
"github:google/google-java-format" = "1.34.1"
"github:grafana/flint" = "0.20.4"
"github:pinterest/ktlint" = "1.8.0"
hadolint = "2.14.0"
java = "temurin-25.0.1+8.0.LTS"
lychee = "0.22.0"
node = "24.15.0"
"npm:prettier" = "3.8.3"
"npm:renovate" = "43.127.1"
"pipx:codespell" = "2.4.2"
rumdl = "0.1.80"
shellcheck = "v0.11.0"
shfmt = "v3.12.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.build]
description = "Build the Java project"
run = "./gradlew build"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

[tasks."lint:pre-commit"]
description = "Fast auto-fix lint (skips slow checks) — for pre-commit/pre-push hooks"
run = "flint run --fix --fast-only"

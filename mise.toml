[tools]
java = "temurin-25.0.1+8.0.LTS"
node = "24.15.0"

# Linters
actionlint = "1.7.10"
"aqua:grafana/flint" = "0.22.2"
"aqua:jonwiggins/xmloxide" = "0.4.2"
"aqua:owenlamont/ryl" = "0.9.1"
biome = "2.4.12"
editorconfig-checker = "v3.6.0"
google-java-format = "1.35.0"
hadolint = "2.14.0"
ktlint = "1.8.0"
lychee = "0.24.2"
"npm:renovate" = "43.150.0"
rumdl = "0.1.80"
shellcheck = "v0.11.0"
shfmt = "v3.12.0"
taplo = "0.10.0"
typos = "1.46.1"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.build]
description = "Build the Java project"
run = "./gradlew build"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"

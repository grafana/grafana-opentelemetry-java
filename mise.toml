[tools]
java = "temurin-25.0.1+8.0.LTS"
node = "24.18.0"

# Linters
actionlint = "1.7.12"
"aqua:grafana/flint" = "0.22.6"
"aqua:jonwiggins/xmloxide" = "0.4.3"
"aqua:owenlamont/ryl" = "0.21.0"
biome = "2.5.2"
editorconfig-checker = "3.8.0"
google-java-format = "1.35.0"
hadolint = "2.14.0"
ktlint = "1.8.0"
lychee = "0.24.2"
"npm:renovate" = "43.251.0"
rumdl = "0.2.27"
shellcheck = "v0.11.0"
shfmt = "3.13.1"
taplo = "0.10.0"
typos = "1.48.0"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.build]
description = "Build the Java project"
run = "./gradlew build"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"
